<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | To-Do App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

    <div class="background"></div>

    <div class="container">

        <div class="left">

            <h1>Create Account</h1>

            <p>
                Start organizing your work with our modern To-Do App.
            </p>

            <img src="assets/logo.png" alt="Logo">

        </div>

        <div class="right">

            <form id="signupForm">

                <h2>Sign Up</h2>

                <div class="inputBox">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="signupUsername"
                        placeholder="Username"
                        required>

                </div>

                <div class="inputBox">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="signupEmail"
                        placeholder="Email"
                        required>

                </div>

                <div class="inputBox">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="signupPassword"
                        placeholder="Password"
                        required>

                </div>

                <div class="inputBox">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                </div>

                <button type="submit">

                    Create Account

                </button>

                <div class="bottom">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </form>

        </div>

    </div>

    <script src="js/auth.js"></script>

</body>

</html>
